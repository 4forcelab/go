<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>4force OnePage｜客戶成交頁系統</title>
  <meta name="description" content="4force OnePage 是萬合天宜有限公司提供的一頁式成交頁與數位名片網頁交付系統。若您正在尋找 4force lab，請前往主官網。" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://go.4force.com.tw/" />

  <meta http-equiv="refresh" content="6;url=https://www.4force.com.tw/" />

  <style>
    :root {
      --bg: #0a0a0a;
      --ink: #f0ede8;
      --muted: rgba(240,237,232,.62);
      --green: #00FF9F;
      --blue: #00B4FF;
      --pink: #FF2D78;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,255,159,.12), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(0,180,255,.10), transparent 34%),
        radial-gradient(circle at 50% 90%, rgba(255,45,120,.08), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.8;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
      border: 1px solid rgba(240,237,232,.12);
      background: rgba(10,10,10,.72);
      backdrop-filter: blur(16px);
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 24px 80px rgba(0,0,0,.36);
    }

    .kicker {
      color: var(--green);
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    h1 span {
      display: block;
      color: var(--green);
      text-shadow: 0 0 28px rgba(0,255,159,.18);
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 16px;
    }

    .mission {
      margin: 24px 0;
      padding-left: 16px;
      border-left: 2px solid var(--green);
      color: rgba(240,237,232,.86);
    }

    a {
      display: inline-flex;
      margin-top: 18px;
      color: #0a0a0a;
      background: var(--green);
      text-decoration: none;
      padding: 12px 22px;
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 800;
    }

    a:hover {
      background: var(--blue);
    }

    small {
      display: block;
      margin-top: 22px;
      color: rgba(240,237,232,.38);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <main>
    <div class="kicker">4force OnePage System</div>

    <h1>
      客戶成交頁系統
      <span>不是主官網</span>
    </h1>

    <p>
      這裡是萬合天宜有限公司 4force lab 的 OnePage 交付節點，
      用於承載客戶專案頁、數位名片頁、QR Code Landing Page 與一頁式成交頁。
    </p>

    <div class="mission">
      insight strategy creativity execution<br />
      萬事皆宜，天作之合。
    </div>

    <p>
      若您正在尋找 4force lab 主官網，系統將於 6 秒後自動導向。
    </p>

    <a href="https://www.4force.com.tw/">Enter 4force lab</a>

    <small>go.4force.com.tw｜OnePage delivery node by 4force lab</small>
  </main>
</body>
</html>
